const PCT_BY_REPS = { 1: 100, 2: 95, 3: 93, 4: 90, 5: 87, 6: 85, 7: 83, 8: 80, 9: 77, 10: 75, 11: 73, 12: 70, 13: 68, 14: 67, 15: 65 };
function pctForReps(reps) {
  return PCT_BY_REPS[reps] || (reps > 15 ? 60 : 100);
}
function estimateOneRM(weight, reps) {
  if (reps <= 1) return weight;
  return weight * (1 + reps / 30);
}
function toKg(v) {
  return v * 0.453592;
}
function toLbs(v) {
  return v * 2.20462;
}
function convertWeight(value, fromUnit, toUnit) {
  if (fromUnit === toUnit) return value;
  return fromUnit === "lbs" ? toKg(value) : toLbs(value);
}
function firstRepNumber(repRange) {
  const n = parseInt(String(repRange).split("-")[0], 10);
  return isNaN(n) ? 10 : n;
}

function buildProgram(level, goal, environment, injuryAreas, focusAreas, cardioMode) {
  const bank = EXERCISES[environment];
  const days = level === "beginner" ? 3 : level === "intermediate" ? 4 : 5;
  const repRange = goal === "strength" ? "4-6" : goal === "fatloss" ? "12-15" : "8-12";
  const sets = goal === "strength" ? 3 : level === "advanced" ? 4 : 3;
  const warmup = WARMUP[environment];
  const cardio = cardioMode && cardioMode !== "none" ? { label: CARDIO_OPTIONS[cardioMode].label, detail: CARDIO_OPTIONS[cardioMode][environment] } : null;
  const splitPlan =
    days === 3
      ? [["push", "legs"], ["pull", "legs"], ["push", "pull"]]
      : days === 4
      ? [["push"], ["pull"], ["legs"], ["push", "pull"]]
      : [["push"], ["pull"], ["legs"], ["push"], ["pull", "legs"]];

  const program = splitPlan.map((groups, i) => {
    let exList = [];
    groups.forEach((g) => {
      const picks = bank[g].slice(0, g === "legs" ? 4 : 3);
      exList = exList.concat(picks.map((e) => ({ ...e, group: g })));
    });
    const adjusted = exList.map((ex) => {
      const hit = (injuryAreas || []).find((a) => ex.risky.includes(a));
      if (hit) {
        return { ...ex, flagged: true, note: `Modified for ${hit}: control range of motion, stop short of pain.` };
      }
      return ex;
    });

    (focusAreas || []).forEach((f) => {
      const targetGroup = FOCUS_TO_GROUP[f];
      const applies = targetGroup === null || groups.includes(targetGroup);
      if (!applies) return;
      const extraBank = EXTRA_FOCUS_EXERCISES[environment][f] || [];
      const pick = extraBank.find((name) => !adjusted.some((ex) => ex.name === name));
      if (pick) {
        adjusted.push({ name: pick, risky: [], group: FOCUS_TO_GROUP[f] || groups[0], extra: true, note: `Added for your ${f} focus` });
      }
    });

    return { day: i + 1, groups, exercises: adjusted };
  });
  return { program, sets, repRange, warmup, cardio };
}

function movementPattern(name) {
  const n = (name || "").toLowerCase();
  const table = [
    ["squat", ["squat", "wall sit", "step-up", "step up", "lunge"]],
    ["hinge", ["deadlift", "glute bridge", "hip thrust", "superman", "good morning"]],
    ["row", ["row", "pulldown", "pull-apart", "face pull", "pull-up"]],
    ["curl", ["curl"]],
    ["core", ["plank", "woodchop", "leg raise", "crunch"]],
    ["calf", ["calf"]],
  ];
  for (const [pattern, keys] of table) {
    if (keys.some((k) => n.includes(k))) return pattern;
  }
  return "press";
}

function CameraCapture({ onCapture, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [facing, setFacing] = useState("environment");
  const [error, setError] = useState("");

  useEffect(() => {
    let active = true;
    async function start() {
      setError("");
      try {
        if (streamRef.current) {
          streamRef.current.getTracks().forEach((t) => t.stop());
        }
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: false });
        if (!active) {
          stream.getTracks().forEach((t) => t.stop());
          return;
        }
        streamRef.current = stream;
        if (videoRef.current) videoRef.current.srcObject = stream;
      } catch (err) {
        setError("Camera access isn't available. Check your browser's camera permission for this site, or use a file upload instead.");
      }
    }
    start();
    return () => {
      active = false;
      if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop());
    };
  }, [facing]);

  function capture() {
    const video = videoRef.current;
    if (!video || !video.videoWidth) return;
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);
    canvas.toBlob((blob) => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      onCapture({ url, blob });
    }, "image/jpeg", 0.92);
  }

  return (
    <div className="fixed inset-0 z-50 bg-black flex flex-col">
      <div className="flex items-center justify-between p-4">
        <button onClick={onClose} className="text-white bg-zinc-800/80 rounded-full p-2"><X size={18} /></button>
        <button onClick={() => setFacing((f) => (f === "environment" ? "user" : "environment"))} className="text-white bg-zinc-800/80 rounded-full p-2"><RefreshCw size={18} /></button>
      </div>
      <div className="flex-1 flex items-center justify-center overflow-hidden">
        {error ? (
          <div className="text-zinc-300 text-sm text-center px-8">{error}</div>
        ) : (
          <video ref={videoRef} autoPlay playsInline muted className="max-h-full max-w-full" style={{ transform: facing === "user" ? "scaleX(-1)" : "none" }} />
        )}
      </div>
      <div className="p-8 flex items-center justify-center">
        <button onClick={capture} disabled={!!error} className="w-16 h-16 rounded-full bg-white border-4 border-zinc-400 disabled:opacity-30"></button>
      </div>
    </div>
  );
}

  const [savedPrograms, setSavedPrograms] = useState([]);
  const [oneRMs, setOneRMs] = useState({});
  const [rmForm, setRmForm] = useState({ chest: { weight: "", reps: "" }, back: { weight: "", reps: "" }, legs: { weight: "", reps: "" } });
  const [logDraft, setLogDraft] = useState([]);
  const [workoutLog, setWorkoutLog] = useState([]);

  const [entries, setEntries] = useState([]);
  const [manual, setManual] = useState({ name: "", cal: "", p: "", c: "", f: "" });

  const [progressPhotos, setProgressPhotos] = useState([]);
  const progressInputRef = useRef(null);

  const [weightLog, setWeightLog] = useState([]);
  const [weightInput, setWeightInput] = useState("");

  const [showCamera, setShowCamera] = useState(null);
  const [promotePhoto, setPromotePhoto] = useState(null);
  const [promoteCaption, setPromoteCaption] = useState(SHARE_CAPTION);
  const [shareNote, setShareNote] = useState("");

  function toggleArea(list, setList, value) {
    setList((prev) => (prev.includes(value) ? prev.filter((v) => v !== value) : [...prev, value]));
  }

  function handleGenerate() {
    setPlan(buildProgram(level, goal, environment, injuryAreas, focusAreas, cardioMode));
  }

  function saveProgramme() {
    if (!plan) return;
    const extras = [...injuryAreas, ...focusAreas];
    const name = `${level} ${goal} \u00b7 ${environment}${extras.length ? ` (${extras.join(", ")})` : ""}`;
    setSavedPrograms((prev) => [{ id: Date.now(), name, date: new Date().toLocaleDateString(), plan, level, goal, environment, injuryAreas, focusAreas, cardioMode }, ...prev]);
  }

  function loadProgramme(saved) {
    setPlan(saved.plan);
    setLevel(saved.level);
    setGoal(saved.goal);
    setEnvironment(saved.environment);
    setInjuryAreas(saved.injuryAreas || []);
    setFocusAreas(saved.focusAreas || []);
    setCardioMode(saved.cardioMode || "none");
    setWorkoutView("build");
  }

  function deleteProgramme(id) {
    setSavedPrograms((prev) => prev.filter((p) => p.id !== id));
  }

  function startLogFromDay(day) {
    setLogDraft(day.exercises.map((ex) => ({ name: ex.name, weight: "", reps: "", sets: "" })));
    setWorkoutView("log");
  }

  function addLogRow() {
    setLogDraft((prev) => [...prev, { name: "", weight: "", reps: "", sets: "" }]);
  }

  function updateLogRow(idx, field, value) {
    setLogDraft((prev) => prev.map((row, i) => (i === idx ? { ...row, [field]: value } : row)));
  }

  function removeLogRow(idx) {
    setLogDraft((prev) => prev.filter((_, i) => i !== idx));
  }

  function saveWorkoutLog() {
    const valid = logDraft.filter((r) => r.name.trim()).map((r) => ({ ...r, unit }));
    if (!valid.length) return;
    setWorkoutLog((prev) => [{ id: Date.now(), date: new Date().toLocaleDateString(), exercises: valid }, ...prev]);
    setLogDraft([]);
  }

  function deleteWorkoutLog(id) {
    setWorkoutLog((prev) => prev.filter((l) => l.id !== id));
  }

  function calculateOneRM(category) {
    const form = rmForm[category];
    const w = parseFloat(form.weight);
    const r = parseInt(form.reps, 10);
    if (!w || !r) return;
    const oneRM = estimateOneRM(w, r);
    setOneRMs((prev) => ({ ...prev, [category]: { oneRM, unit } }));
    setRmForm((prev) => ({ ...prev, [category]: { weight: "", reps: "" } }));
  }

  function deleteOneRM(category) {
    setOneRMs((prev) => {
      const next = { ...prev };
      delete next[category];
      return next;
    });
  }

  function suggestedWeightForGroup(group, repRange) {
    const category = GROUP_TO_CATEGORY[group];
    const rm = oneRMs[category];
    if (!rm) return null;
    const reps = firstRepNumber(repRange);
    const pct = pctForReps(reps);
    const oneRMInUnit = convertWeight(rm.oneRM, rm.unit, unit);
    return Math.round(oneRMInUnit * (pct / 100));
  }

  function addManual() {
    if (!manual.name) return;
    setEntries((prev) => [...prev, { name: manual.name, cal: +manual.cal || 0, p: +manual.p || 0, c: +manual.c || 0, f: +manual.f || 0, source: "manual" }]);
    setManual({ name: "", cal: "", p: "", c: "", f: "" });
  }

  const totals = entries.reduce(
    (a, e) => ({ cal: a.cal + e.cal, p: a.p + e.p, c: a.c + e.c, f: a.f + e.f }),
    { cal: 0, p: 0, c: 0, f: 0 }
  );

  function handleProgressUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const preview = URL.createObjectURL(file);
    setProgressPhotos((prev) => [{ preview, date: new Date().toLocaleDateString() }, ...prev]);
  }

  function addWeightEntry() {
    const w = parseFloat(weightInput);
    if (!w) return;
    setWeightLog((prev) => [...prev, { id: Date.now(), weight: w, unit, date: new Date().toLocaleDateString() }]);
    setWeightInput("");
  }

  function deleteWeightEntry(id) {
    setWeightLog((prev) => prev.filter((e) => e.id !== id));
  }

  function handleCameraCapture({ url, blob }) {
    if (showCamera === "progress") {
      setProgressPhotos((prev) => [{ preview: url, date: new Date().toLocaleDateString() }, ...prev]);
    } else if (showCamera === "promote") {
      setPromotePhoto({ url, blob });
    }
    setShowCamera(null);
  }

  async function shareProgress() {
    setShareNote("");
    if (!promotePhoto) return;
    const file = new File([promotePhoto.blob], "forged-physique-progress.jpg", { type: "image/jpeg" });
    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], text: promoteCaption, title: "Forged Physique" });
        return;
      }
      if (navigator.share) {
        await navigator.share({ text: promoteCaption, title: "Forged Physique" });
        setShareNote("Your browser can't attach the photo directly to this share sheet, so only the caption was shared. Save the photo below and attach it manually.");
        return;
      }
      setShareNote("Sharing isn't supported in this browser. Download the photo below and post it manually with the caption.");
    } catch (err) {
      setShareNote("Share was cancelled or isn't available here. Download the photo below and post it manually if needed.");
    }
  }

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-100 flex justify-center">

                const max = Math.max(...points);
                const range = max - min || 1;
                const w = 300, h = 100, pad = 10;
                const coords = points.map((v, i) => {
                  const x = pad + (i * (w - pad * 2)) / (points.length - 1);
                  const y = h - pad - ((v - min) / range) * (h - pad * 2);
                  return `${x},${y}`;
                });
                const first = weightLog[0];
                const last = weightLog[weightLog.length - 1];
                const delta = convertWeight(last.weight, last.unit, unit) - convertWeight(first.weight, first.unit, unit);
                return (
                  <div className="bg-zinc-800 rounded-xl p-4">
                    <div className="flex items-center justify-between mb-2">
                      <div className="text-xs text-zinc-400">{first.date} &rarr; {last.date}</div>
                      <div className={`text-xs font-bold flex items-center gap-1 ${delta <= 0 ? "text-green-400" : "text-orange-400"}`}>
                        {delta <= 0 ? <TrendingDown size={13} /> : <TrendingUp size={13} />}
                        {delta > 0 ? "+" : ""}{delta.toFixed(1)} {unit}
                      </div>
                    </div>
                    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-24">
                      <polyline points={coords.join(" ")} fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                      {coords.map((c, i) => {
                        const [x, y] = c.split(",");
                        return <circle key={i} cx={x} cy={y} r="2.5" fill="#f97316" />;
                      })}
                    </svg>
                  </div>
                );
              })()}

              <div className="space-y-2">
                {weightLog.slice().reverse().map((e) => (
                  <div key={e.id} className="flex justify-between items-center bg-zinc-800 rounded-lg p-3 text-sm">
                    <div className="text-zinc-400">{e.date}</div>
                    <div className="flex items-center gap-3">
                      <div className="font-bold">{Math.round(convertWeight(e.weight, e.unit, unit) * 10) / 10} {unit}</div>
                      <button onClick={() => deleteWeightEntry(e.id)} className="text-zinc-500 hover:text-red-400"><Trash2 size={14} /></button>
                    </div>
                  </div>
                ))}
                {weightLog.length === 0 && <div className="text-sm text-zinc-500 text-center py-8">No weigh-ins yet. Log your first above.</div>}
              </div>
            </div>
          )}
        </div>

        <div className="flex border-t border-zinc-800 bg-zinc-900">
          {TABS.map((t) => {
            const Icon = t.icon;
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 py-3 flex flex-col items-center gap-1 ${active ? "text-orange-500" : "text-zinc-500"}`}>
                <Icon size={20} />
                <span className="text-[10px] font-bold uppercase tracking-wide">{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
      {showCamera && <CameraCapture onCapture={handleCameraCapture} onClose={() => setShowCamera(null)} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
